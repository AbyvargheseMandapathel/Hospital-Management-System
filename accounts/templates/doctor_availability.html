{% extends "base/doctor_base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-6 bg-white shadow-lg rounded-lg">
    <h2 class="text-xl font-semibold text-gray-700 mb-4">Set Your Availability</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="p-3 mb-3 text-white {{ message.tags }} bg-green-500 rounded-md">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <label class="block text-gray-700 font-medium">Select Days:</label>
        <div class="grid grid-cols-3 gap-3">
            {% for day, label in DoctorAvailability.DAYS_OF_WEEK %}
            <label class="flex items-center space-x-2">
                <input type="checkbox" name="days" value="{{ day }}" 
                    class="rounded text-indigo-600 focus:ring-2 focus:ring-indigo-500"
                    {% if day in selected_days %} checked {% endif %}>
                <span class="text-gray-800">{{ label }}</span>
            </label>
            {% endfor %}
        </div>

        <div class="flex flex-col space-y-3">
            <label class="block text-gray-700 font-medium">Start Time:</label>
            <input type="time" name="start_time" required class="w-full p-2 border rounded-lg">

            <label class="block text-gray-700 font-medium">End Time:</label>
            <input type="time" name="end_time" required class="w-full p-2 border rounded-lg">
        </div>

        <button type="submit"
            class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-indigo-700 transition">
            Save Availability
        </button>
    </form>
</div>
{% endblock %}
