<div class="container mx-auto p-6">
    <h2 class="text-2xl font-bold text-center">Forgot Password?</h2>
    <p class="text-center text-gray-600">Enter your email to receive a password reset link.</p>

    <form method="POST" class="bg-white p-4 rounded-lg shadow-md">
        {% csrf_token %}
        <label class="block text-gray-700 font-semibold">Email:</label>
        <input type="email" name="email" class="border border-gray-300 p-2 w-full rounded-lg text-black" required>

        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 mt-4">
            Send Reset Link
        </button>
    </form>
</div>
