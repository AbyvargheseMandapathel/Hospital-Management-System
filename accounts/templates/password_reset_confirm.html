<div class="container mx-auto p-6">
    <h2 class="text-2xl font-bold text-center">Reset Your Password</h2>

    <form method="POST" class="bg-white p-4 rounded-lg shadow-md">
        {% csrf_token %}
        <label class="block text-gray-700 font-semibold">New Password:</label>
        <input type="password" name="new_password" class="border border-gray-300 p-2 w-full rounded-lg text-black" required>

        <label class="block text-gray-700 font-semibold mt-2">Confirm Password:</label>
        <input type="password" name="confirm_password" class="border border-gray-300 p-2 w-full rounded-lg text-black" required>

        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 mt-4">
            Reset Password
        </button>
    </form>
</div>
